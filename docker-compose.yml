version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_DRIVER=sqlite
      - DB_DSN=file:/data/formula.db?_journal=WAL&_foreign_keys=on
      - AUTH_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENGINE_MAX_WORKERS=0
      - ENGINE_INTERMEDIATE_PRECISION=28
      - ENGINE_OUTPUT_PRECISION=18
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: PostgreSQL for production deployments
  # postgres:
  #   image: postgres:16-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: formula_service
  #     POSTGRES_USER: formula
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-formula_dev}
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data

volumes:
  db-data:
  # pg-data:
